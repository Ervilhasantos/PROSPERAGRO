<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProsperAgro — Gerador de Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#001e1e;font-family:'Poppins',sans-serif;color:#fff;display:flex;min-height:100vh;}

.sidebar{width:300px;min-width:300px;background:#002828;border-right:1px solid #003e3e;padding:22px 18px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.sidebar-title{font-family:'Poppins',sans-serif;font-size:12px;font-weight:800;letter-spacing:3px;color:#00e49e;text-transform:uppercase;padding-bottom:12px;border-bottom:1px solid #003e3e;}
.s-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#00e49e;margin-bottom:4px;}
.toggle-row{display:flex;gap:5px;}
.tog-btn{flex:1;padding:8px 4px;border:1px solid #003e3e;background:transparent;color:#00a070;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.tog-btn.active{background:#003e3e;color:#00e49e;border-color:#00e49e;}
.tog-btn:hover:not(.active){border-color:#00e49e;color:#00e49e;}
.s-input{width:100%;background:#001e1e;border:1px solid #003e3e;color:#00e49e;font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;padding:8px 10px;outline:none;transition:border-color .2s;}
.s-input:focus{border-color:#00e49e;}
select.s-input option{background:#001e1e;}
.gen-btn{width:100%;padding:12px;background:linear-gradient(135deg,#003e3e,#006060);color:#00e49e;border:1px solid #00e49e;font-family:'Poppins',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.gen-btn:hover{background:linear-gradient(135deg,#004e4e,#00e49e);color:#001e1e;transform:translateY(-1px);}
.exp-btn{width:100%;padding:10px;background:transparent;color:#00e49e;border:1px solid #003e3e;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.exp-btn:hover{background:#003e3e;}
.chart-mode-row{display:flex;gap:5px;margin-top:2px;}
.mode-btn{flex:1;padding:7px 4px;border:1px solid #003e3e;background:transparent;color:#00a070;font-family:'Poppins',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.mode-btn.active{background:#003e3e;color:#00e49e;border-color:#00e49e;}
.mode-btn:hover:not(.active){border-color:#00e49e;color:#00e49e;}


.preview-area{flex:1;display:flex;align-items:center;justify-content:center;padding:30px;background:#001414;}
#cardWrap{width:540px;height:540px;flex-shrink:0;box-shadow:0 0 60px rgba(0,228,158,0.15);}
canvas#card{width:540px;height:540px;display:block;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-title">🌿 ProsperAgro · Gerador</div>

  <div>
    <div class="s-label">Tipo de Opção</div>
    <div class="toggle-row">
      <button class="tog-btn" id="btnCall" onclick="setTipo('call')">CALL</button>
      <button class="tog-btn active" id="btnPut" onclick="setTipo('put')">PUT</button>
      <button class="tog-btn" id="btnPutLim" onclick="setTipo('put_lim')">PUT LIM.</button>
    </div>
  </div>

  <div>
    <div class="s-label">Commodity</div>
    <div class="toggle-row">
      <button class="tog-btn active" id="cMilho" onclick="setCom('milho',this)">Milho</button>
      <button class="tog-btn" id="cSoja" onclick="setCom('soja',this)">Soja</button>
      <button class="tog-btn" id="cBoi" onclick="setCom('boi',this)">Boi</button>
    </div>
  </div>


  <div>
    <div class="s-label">Visualização do Gráfico</div>
    <div class="chart-mode-row">
      <button class="mode-btn active" id="modeNone" onclick="setChartMode('none',this)">⬜ Sem Gráfico</button>
      <button class="mode-btn" id="modeLine" onclick="setChartMode('line',this)">📈 Com Gráfico</button>
    </div>
  </div>
  <div>
    <div class="s-label">Mês de Vencimento</div>
    <select class="s-input" id="mes">
      <option>Janeiro</option><option>Fevereiro</option><option>Março</option>
      <option>Abril</option><option>Maio</option><option>Junho</option>
      <option>Julho</option><option>Agosto</option><option selected>Setembro</option>
      <option>Outubro</option><option>Novembro</option><option>Dezembro</option>
    </select>
  </div>

  <div>
    <div class="s-label">Strike / Referência (R$)</div>
    <input class="s-input" type="number" id="strike" value="70.00" step="0.01">
  </div>

  <div>
    <div class="s-label">Custo / Prêmio (R$)</div>
    <input class="s-input" type="number" id="custo" value="1.00" step="0.01">
  </div>

  <div id="limitRow" style="display:none">
    <div class="s-label">Limite Inferior — R$ (PUT Limitada)</div>
    <input class="s-input" type="number" id="limite" value="60.00" step="0.01">
  </div>

  <div>
    <div class="s-label">Data Cotação</div>
    <input class="s-input" type="text" id="dataCot" value="12/03/2026">
  </div>

  <div>
    <div class="s-label">Data Vencimento</div>
    <input class="s-input" type="text" id="dataVenc" value="15/09/2026">
  </div>

  <button class="gen-btn" onclick="draw()">▶ GERAR CARD</button>
  <button class="exp-btn" onclick="exportPNG()">↓ EXPORTAR PNG</button>
</div>

<div class="preview-area">
  <div id="cardWrap">
    <canvas id="card" width="1080" height="1080"></canvas>
  </div>
</div>

const C = {
  dark:    '#003e3e',
  accent:  '#00e49e',
  white:   '#ffffff',
  dimText: 'rgba(0,228,158,0.55)',
  lineCol: 'rgba(0,228,158,0.18)',
  arrowCol:'#00e49e',
};

function fmt(v){return parseFloat(v).toFixed(2).replace('.',',');}

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawArrowFlag(rightX, midY, label){
  const bw=220, bh=52, bx=rightX-bw, by=midY-bh/2;
  ctx.save();
  ctx.fillStyle=C.white;
  rr(bx,by,bw,bh,5); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(rightX,midY);
  ctx.lineTo(rightX-28,midY-20);
  ctx.lineTo(rightX-28,midY+20);
  ctx.closePath();
  ctx.fillStyle=C.white; ctx.fill();
  ctx.fillStyle='#111';
  ctx.font='bold 30px Poppins,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('R$ '+label, bx+bw/2, midY);
  ctx.restore();
}

function drawBigArrow(cx, cy, up){
  const color=C.arrowCol;
  const s=90, hw=s*0.48, sw=s*0.22;
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=22;
  ctx.fillStyle=color;
  ctx.beginPath();
  if(up){
    ctx.moveTo(cx,cy-s/2);
    ctx.lineTo(cx+hw,cy-s*0.08);
    ctx.lineTo(cx+sw,cy-s*0.08);
    ctx.lineTo(cx+sw,cy+s/2);
    ctx.lineTo(cx-sw,cy+s/2);
    ctx.lineTo(cx-sw,cy-s*0.08);
    ctx.lineTo(cx-hw,cy-s*0.08);
  } else {
    ctx.moveTo(cx,cy+s/2);
    ctx.lineTo(cx+hw,cy+s*0.08);
    ctx.lineTo(cx+sw,cy+s*0.08);
    ctx.lineTo(cx+sw,cy-s/2);
    ctx.lineTo(cx-sw,cy-s/2);
    ctx.lineTo(cx-sw,cy+s*0.08);
    ctx.lineTo(cx-hw,cy+s*0.08);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawLabelBox(cx, cy, line1, line2){
  const bw=440, bh=108;
  ctx.save();
  ctx.strokeStyle='rgba(0,228,158,0.45)'; ctx.lineWidth=2.5;
  rr(cx-bw/2,cy-bh/2,bw,bh,6);
  ctx.fillStyle='rgba(0,30,30,0.45)'; ctx.fill();
  ctx.stroke();
  ctx.font='600 22px Poppins,sans-serif';
  ctx.fillStyle='rgba(0,228,158,0.72)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(line1,cx,cy-20);
  ctx.font='bold 40px Poppins,sans-serif';
  ctx.fillStyle=C.white;
  ctx.fillText(line2,cx,cy+24);
  ctx.restore();
}

// Texto em uma única linha — reduz fonte automaticamente se necessário
function bigText(text, cx, cy, maxSize=78, maxWidth=860){
  ctx.save();
  let size = maxSize;
  ctx.font=`900 ${size}px Poppins,sans-serif`;
  while(ctx.measureText(text).width > maxWidth && size > 40){
    size -= 2;
    ctx.font=`900 ${size}px Poppins,sans-serif`;
  }
  ctx.shadowColor='rgba(0,228,158,0.3)'; ctx.shadowBlur=18;
  ctx.fillStyle=C.white;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,cx,cy);
  ctx.restore();
}

function hline(y){
  ctx.save();
  ctx.strokeStyle=C.lineCol; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(60,y); ctx.lineTo(W-60,y); ctx.stroke();
  ctx.restore();
}

// Gera pontos de linha pseudo-realistas
function generateLinePoints(base, range, count){
  const pts = [];
  let price = base + (Math.random()-0.5)*range;
  for(let i=0;i<count;i++){
    price += (Math.random()-0.48)*range*0.25;
    pts.push(price);
  }
  return pts;
}

let lineData = null;
let lastLineCommodity = null;
let chartStrikeY = 0;
let chartLimiteY = 0;

function draw(){
  const strike=parseFloat(document.getElementById('strike').value)||70;
  const custo=parseFloat(document.getElementById('custo').value)||1;
  const limite=parseFloat(document.getElementById('limite').value)||60;
  const mes=document.getElementById('mes').value.toUpperCase();
  const dataCot=document.getElementById('dataCot').value;
  const dataVenc=document.getElementById('dataVenc').value;
  const comLabel=commodity==='boi'?'BOI':commodity==='soja'?'SOJA':'MILHO';
  const unidade=commodity==='boi'?'@':'SACA';

  ctx.clearRect(0,0,W,H);

  // BG
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#002828');
  bg.addColorStop(0.5,'#003030');
  bg.addColorStop(1,'#001a1a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const g1=ctx.createRadialGradient(W*0.8,H*0.1,0,W*0.8,H*0.1,W*0.55);
  g1.addColorStop(0,'rgba(0,62,62,0.55)'); g1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g1; ctx.fillRect(0,0,W,H);
  const g2=ctx.createRadialGradient(W*0.2,H*0.85,0,W*0.2,H*0.85,W*0.4);
  g2.addColorStop(0,'rgba(0,50,50,0.35)'); g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);

  // ---- LOGO (imagem real) ----
  // Logo original é 722x103. Vamos renderizar com largura de ~680px centralizada.
  const logoW = 680;
  const logoH = Math.round(103 * logoW / 722);
  const logoX = (W - logoW) / 2;
  const logoY = 38;
  if(logoImg.complete && logoImg.naturalWidth > 0){
    ctx.drawImage(logoImg, logoX, logoY, logoW, logoH);
  }

  // separator abaixo do header
  const sepY = logoY + logoH + 32;
  ctx.strokeStyle='rgba(0,228,158,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(60,sepY); ctx.lineTo(W-60,sepY); ctx.stroke();

  // subtitle
  const tipoStr=tipo==='call'?'CALL':tipo==='put_lim'?'PUT LIMITADA':'PUT';
  ctx.save();
  ctx.font='700 28px Poppins,sans-serif';
  ctx.fillStyle='rgba(0,228,158,0.7)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`${tipoStr}          ${comLabel} ${mes}`,W/2, sepY+44);
  ctx.restore();

  // content zone
  const cTop = sepY + 88;
  const cBot = 840;
  const cH = cBot - cTop;
  const arrowX = 120;
  const textCX = W/2 + 30;
  const flagX = W - 46;

  // ---- MODO GRÁFICO DE LINHA ----
  if(chartMode === 'line'){
    const range = strike * 0.06;
    const gL=0, gT=cTop, gB=cBot;
    const gW=W, gH=gB-gT;
    const PAD_L=0, PAD_R=110, PAD_T=10, PAD_B=10;
    const chartW=gW-PAD_L-PAD_R, chartH=gH-PAD_T-PAD_B;

    // Para put_lim: strike e limite ambos mapeados no gráfico
    // Para call/put: strike fixo no meio
    let minP, maxP, strikeY;
    if(tipo === 'put_lim'){
      const mid = (strike + limite) / 2;
      const spread = Math.max(strike - limite, range) * 1.6;
      minP = mid - spread;
      maxP = mid + spread;
      strikeY = gT + PAD_T + chartH - ((strike - minP) / (maxP - minP)) * chartH;
    } else {
      minP = strike - range * 1.5;
      maxP = strike + range * 1.5;
      strikeY = gT + PAD_T + chartH * 0.5; // meio exato
    }
    const py = p => gT + PAD_T + chartH - ((p - minP) / (maxP - minP)) * chartH;
    const px = (i, total) => gL + PAD_L + (i / (total - 1)) * chartW;

    // Gerar dados que SEMPRE tocam o strike (e o limite, no put_lim)
    const comKey = commodity + '_line_' + strike + '_' + tipo + '_' + limite;
    if(lastLineCommodity !== comKey){
      const pts = 100;
      lineData = [];
      const cross1 = Math.floor(pts * 0.38);
      const cross2 = Math.floor(pts * 0.62);
      for(let i = 0; i < pts; i++){
        let p;
        const noise = (Math.random() - 0.5) * range * 0.45;
        const t = i / (pts - 1);
        if(tipo === 'call'){
          const trend = strike - range + (2 * range * t);
          p = trend + noise;
        } else if(tipo === 'put'){
          const trend = strike + range - (2 * range * t);
          p = trend + noise;
        } else {
          // put_lim: começa acima do strike, desce, cruza strike, continua caindo, cruza limite, desce mais
          const top = strike + range * 0.9;
          const bot = limite - range * 0.9;
          const trend = top - (top - bot) * t;
          p = trend + noise;
        }
        lineData.push(p);
      }
      // Forçar cruzamentos precisos
      if(tipo === 'put_lim'){
        lineData[cross1] = strike + (Math.random() - 0.5) * range * 0.05;
        lineData[cross2] = limite + (Math.random() - 0.5) * range * 0.05;
      } else {
        lineData[cross1] = strike + (Math.random() - 0.5) * range * 0.05;
      }
      lastLineCommodity = comKey;
    }

    const total = lineData.length;

    ctx.save();
    ctx.beginPath();
    ctx.rect(gL, gT, gW, gH);
    ctx.clip();

    // Grid sutil
    ctx.strokeStyle='rgba(0,228,158,0.06)';
    ctx.lineWidth=1;
    for(let i=0;i<=8;i++){
      const y = gT+PAD_T + (chartH/8)*i;
      ctx.beginPath(); ctx.moveTo(gL,y); ctx.lineTo(gL+chartW,y); ctx.stroke();
    }
    for(let i=0;i<=10;i++){
      const x = gL + (chartW/10)*i;
      ctx.beginPath(); ctx.moveTo(x,gT+PAD_T); ctx.lineTo(x,gT+PAD_T+chartH); ctx.stroke();
    }

    // Área sob a linha
    ctx.beginPath();
    ctx.moveTo(px(0,total), py(lineData[0]));
    for(let i=1;i<total;i++) ctx.lineTo(px(i,total), py(lineData[i]));
    ctx.lineTo(px(total-1,total), gT+PAD_T+chartH);
    ctx.lineTo(px(0,total), gT+PAD_T+chartH);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, gT+PAD_T, 0, gT+PAD_T+chartH);
    grad.addColorStop(0,'rgba(0,228,158,0.22)');
    grad.addColorStop(1,'rgba(0,62,62,0.04)');
    ctx.fillStyle=grad; ctx.fill();

    // Linha principal
    ctx.beginPath();
    ctx.moveTo(px(0,total), py(lineData[0]));
    for(let i=1;i<total;i++) ctx.lineTo(px(i,total), py(lineData[i]));
    ctx.strokeStyle='rgba(0,228,158,0.85)'; ctx.lineWidth=3.5; ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.stroke();

    // Linha do strike — sempre no meio (ou mapeada para put_lim)
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(gL, strikeY); ctx.lineTo(gL+chartW, strikeY); ctx.stroke();
    // Para put_lim: linha do limite também
    if(tipo === 'put_lim'){
      const limiteY = py(limite);
      ctx.beginPath(); ctx.moveTo(gL, limiteY); ctx.lineTo(gL+chartW, limiteY); ctx.stroke();
      chartLimiteY = limiteY;
    }
    ctx.setLineDash([]);

    // Guardar posições para o overlay
    chartStrikeY = strikeY;

    ctx.restore();

    // TAG BRANCA do strike — call/put: meio fixo; put_lim: posição mapeada
    drawArrowFlag(W-46, chartStrikeY, fmt(strike));
    if(tipo === 'put_lim') drawArrowFlag(W-46, chartLimiteY, fmt(limite));
  }

  // ---- OVERLAY: textos, setas e boxes por cima do gráfico ----
  if(tipo==='call'){
    const mid=cTop+cH*0.46;
    if(chartMode==='none'){
      ctx.save();
      const tg=ctx.createLinearGradient(0,cTop,0,mid);
      tg.addColorStop(0,'rgba(0,62,62,0.4)'); tg.addColorStop(1,'rgba(0,30,30,0.1)');
      ctx.fillStyle=tg; ctx.fillRect(0,cTop,W,mid-cTop); ctx.restore();
    }
    drawBigArrow(arrowX, cTop+(mid-cTop)*0.40, true);
    bigText('GANHA COM A OPERAÇÃO', textCX, cTop+(mid-cTop)*0.40, 72, 820);
    if(chartMode==='none') drawLabelBox(W/2-30, mid-12, `CALL ${mes} ${comLabel}`, `R$ ${fmt(strike)}   ${unidade}`);
    if(chartMode==='none') drawArrowFlag(flagX, mid, fmt(strike));
    hline(mid);
    const lm=mid+(cBot-mid)*0.5;
    drawBigArrow(arrowX, lm, false);
    bigText('NADA ACONTECE', textCX, lm, 72, 820);

  } else if(tipo==='put'){
    const mid=cTop+cH*0.46;
    if(chartMode==='none'){
      ctx.save();
      const tg=ctx.createLinearGradient(0,cTop,0,mid);
      tg.addColorStop(0,'rgba(0,62,62,0.4)'); tg.addColorStop(1,'rgba(0,30,30,0.1)');
      ctx.fillStyle=tg; ctx.fillRect(0,cTop,W,mid-cTop); ctx.restore();
    }
    drawBigArrow(arrowX, cTop+(mid-cTop)*0.40, true);
    bigText('NADA ACONTECE', textCX, cTop+(mid-cTop)*0.40, 72, 820);
    if(chartMode==='none') drawLabelBox(W/2-30, mid-12, `PUT ${mes} ${comLabel}`, `R$ ${fmt(strike)}   ${unidade}`);
    if(chartMode==='none') drawArrowFlag(flagX, mid, fmt(strike));
    hline(mid);
    const lm=mid+(cBot-mid)*0.5;
    drawBigArrow(arrowX, lm, false);
    bigText('VALOR GARANTIDO PELA BOLSA', textCX, lm, 72, 820);

  } else {
    // PUT LIMITADA
    const t1=cTop+cH*0.30, t2=cTop+cH*0.62;
    if(chartMode==='none'){
      ctx.save();
      const tg=ctx.createLinearGradient(0,cTop,0,t1);
      tg.addColorStop(0,'rgba(0,62,62,0.4)'); tg.addColorStop(1,'rgba(0,30,30,0.1)');
      ctx.fillStyle=tg; ctx.fillRect(0,cTop,W,t1-cTop); ctx.restore();
    }
    drawBigArrow(arrowX, cTop+(t1-cTop)*0.5, true);
    bigText('NADA ACONTECE', textCX-10, cTop+(t1-cTop)*0.5, 72, 820);
    hline(t1);
    if(chartMode==='none'){
      drawArrowFlag(flagX, t1, fmt(strike));
    } else {
      // tags já desenhadas no bloco do gráfico — nada a fazer aqui
    }

    ctx.save();
    const mg=ctx.createLinearGradient(0,t1,0,t2);
    mg.addColorStop(0,'rgba(0,62,62,0.45)'); mg.addColorStop(1,'rgba(0,40,40,0.28)');
    ctx.fillStyle=mg; ctx.fillRect(0,t1,W,t2-t1); ctx.restore();

    bigText('VALOR GARANTIDO PELA BOLSA', W/2, t1+(t2-t1)*0.5, 60, 820);
    hline(t2);
    if(chartMode==='none'){
      drawArrowFlag(flagX, t2, fmt(limite));
    } else {
      // tag do limite já desenhada no bloco do gráfico — nada a fazer aqui
    }

    drawBigArrow(arrowX, t2+(cBot-t2)*0.5, false);
    bigText('COMEÇA A PERDER', textCX-10, t2+(cBot-t2)*0.5, 72, 820);
  }

  // ---- FOOTER ----
  const fy=856;
  hline(fy);

  ctx.save();
  ctx.textBaseline='top';

  ctx.font='600 24px Poppins,sans-serif';
  ctx.fillStyle=C.dimText; ctx.textAlign='left';
  ctx.fillText('REFERÊNCIA',80,fy+26);
  ctx.fillStyle=C.white; ctx.font='bold 24px Poppins,sans-serif';
  ctx.fillText(fmt(strike),310,fy+26);

  ctx.font='600 22px Poppins,sans-serif';
  ctx.fillStyle=C.dimText;
  ctx.fillText('DATA COTAÇÃO',80,fy+68);
  ctx.fillStyle=C.white; ctx.font='bold 22px Poppins,sans-serif';
  ctx.fillText(dataCot,310,fy+68);

  ctx.font='600 24px Poppins,sans-serif';
  ctx.fillStyle=C.dimText;
  ctx.fillText('CUSTO',580,fy+26);
  ctx.fillStyle=C.white; ctx.font='bold 24px Poppins,sans-serif';
  ctx.fillText(fmt(custo),770,fy+26);

  ctx.font='600 22px Poppins,sans-serif';
  ctx.fillStyle=C.dimText;
  ctx.fillText('VENCIMENTO',580,fy+68);
  ctx.fillStyle=C.white; ctx.font='bold 22px Poppins,sans-serif';
  ctx.fillText(dataVenc,770,fy+68);
  ctx.restore();
}

function exportPNG(){
  const link=document.createElement('a');
  link.download=`prosperagro_${tipo}_${commodity}_${document.getElementById('mes').value.toLowerCase()}.png`;
  link.href=canvas.toDataURL('image/png'); link.click();
}

document.getElementById('limitRow').style.display='none';
draw();
document.querySelectorAll('.s-input').forEach(el=>el.addEventListener('input',draw));
</script>
</body>
